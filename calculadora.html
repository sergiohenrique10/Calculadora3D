<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Impressão 3D</title>
    <style>
        :root {
            --primary: #4f46e5;
            --background: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 550px;
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        
        h2 { text-align: center; margin-top: 0; color: var(--primary); font-size: 1.5rem; margin-bottom: 20px; }
        .section-title { font-weight: bold; margin: 20px 0 10px 0; border-bottom: 2px solid #e5e7eb; padding-bottom: 5px; color: #374151; font-size: 1rem; text-transform: uppercase; }
        .row { display: flex; gap: 10px; margin-bottom: 12px; }
        .field { flex: 1; display: flex; flex-direction: column; }
        label { font-size: 0.85rem; margin-bottom: 4px; color: #4b5563; font-weight: 500; }
        input, select { padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem; background: white; }
        input:focus, select:focus { outline: none; border-color: var(--primary); }
        
        button.main-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button.main-btn:hover { background: #4338ca; }
        button.danger-btn { padding: 5px 10px; background: #ef4444; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        
        .result-box { margin-top: 20px; padding: 15px; background: #e0e7ff; border-radius: 8px; display: none; }
        .result-title { font-weight: bold; color: #3730a3; margin-bottom: 8px; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.95rem; }
        .total { font-weight: bold; font-size: 1.1rem; border-top: 1px solid #c7d2fe; padding-top: 5px; margin-top: 5px; color: #1e1b4b; }
        
        .item-list { margin-top: 15px; max-height: 150px; overflow-y: auto; border: 1px dashed #cbd5e1; padding: 10px; border-radius: 8px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; margin-bottom: 6px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculadora 3D Sem Abas</h2>
    
    <!-- BLOCO 1: GERENCIAR FILAMENTOS (Sempre Visível no Topo) -->
    <div class="section-title">1. Cadastrar Seus Filamentos</div>
    <div class="row">
        <div class="field" style="flex: 1.5;">
            <label>Nome / Marca / Tipo</label>
            <input type="text" id="newNome" placeholder="Ex: PLA Prime Preto">
        </div>
        <div class="field">
            <label>Preço do KG (R$)</label>
            <input type="number" id="newPreco" placeholder="Ex: 84">
        </div>
    </div>
    <button class="main-btn" style="background: #059669;" onclick="salvarFilamento()">+ Salvar no Estoque</button>

    <div class="item-list" id="listaFilamentos"></div>

    <!-- BLOCO 2: FAZER CÁLCULO (Sempre Visível Embaixo) -->
    <div class="section-title">2. Calcular Peça Atual</div>
    
    <div class="row">
        <div class="field" style="flex: 1.5;">
            <label>Filamento 1</label>
            <select id="selectMat1" class="filamento-select"><option value="">Carregando...</option></select>
        </div>
        <div class="field">
            <label>Peso (g)</label>
            <input type="number" id="g1" value="0" min="0">
        </div>
        <div class="field">
            <label>Tempo (h)</label>
            <input type="number" id="h1" value="0" step="0.01" min="0" placeholder="Ex: 1.5">
        </div>
    </div>

    <div class="row">
        <div class="field" style="flex: 1.5;">
            <label>Filamento 2 (Opcional)</label>
            <select id="selectMat2" class="filamento-select"><option value="">Carregando...</option></select>
        </div>
        <div class="field">
            <label>Peso (g)</label>
            <input type="number" id="g2" value="0" min="0">
        </div>
        <div class="field">
            <label>Tempo (h)</label>
            <input type="number" id="h2" value="0" step="0.01" min="0" placeholder="Ex: 4.5">
        </div>
    </div>

    <div class="section-title">3. Custos Fixos da Peça</div>
    <div class="row">
        <div class="field">
            <label>Outros Custos (LED, Parafusos, Embalagem)</label>
            <input type="number" id="extras" value="0" step="0.01">
        </div>
    </div>
    <div class="row">
        <div class="field">
            <label>Energia kWh (R$)</label>
            <input type="number" id="kwh" value="1.10" step="0.01">
        </div>
        <div class="field">
            <label>Depreciação/h (R$)</label>
            <input type="number" id="dep" value="0.70" step="0.01">
        </div>
    </div>

    <button class="main-btn" onclick="calcular()">Calcular Custo Real</button>

    <!-- RESULTADO -->
    <div class="result-box" id="resultado">
        <div class="result-title">Resumo do Gasto:</div>
        <div class="result-item"><span id="lblRes1">Material 1:</span> <span id="resM1">R$ 0,00</span></div>
        <div class="result-item"><span id="lblRes2">Material 2:</span> <span id="resM2">R$ 0,00</span></div>
        <div class="result-item"><span>Energia Elétrica:</span> <span id="resEnergia">R$ 0,00</span></div>
        <div class="result-item"><span>+ Taxa de Erro (10%):</span> <span id="resErro">R$ 0,00</span></div>
        <div class="result-item"><span>+ Depreciação Máquina:</span> <span id="resDep">R$ 0,00</span></div>
        <div class="result-item"><span>Componentes Extras:</span> <span id="resExtras">R$ 0,00</span></div>
        <div class="result-item total"><span>Custo Total:</span> <span id="resTotal">R$ 0,00</span></div>
    </div>
</div>

<script>
// Memória interna do app
let filamentos = [];
try {
    filamentos = JSON.parse(localStorage.getItem('filamentos3d_v2')) || [
        { id: 1, nome: "PLA Padrão", preco: 84 },
        { id: 2, nome: "PETG Padrão", preco: 60 }
    ];
} catch (e) {
    filamentos = [{ id: 1, nome: "PLA Padrão", preco: 84 }, { id: 2, nome: "PETG Padrão", preco: 60 }];
}

function salvarFilamento() {
    const nome = document.getElementById('newNome').value.trim();
    const preco = parseFloat(document.getElementById('newPreco').value);
    if (!nome || isNaN(preco)) return alert("Preencha o nome e o preço corretamente!");
    
    filamentos.push({ id: Date.now(), nome, preco });
    
    try {
        localStorage.setItem('filamentos3d_v2', JSON.stringify(filamentos));
    } catch(e){}
    
    document.getElementById('newNome').value = '';
    document.getElementById('newPreco').value = '';
    
    atualizarTudo();
    alert("Filamento salvo e adicionado na lista abaixo!");
}

function deletarFilamento(id) {
    filamentos = filamentos.filter(f => f.id !== id);
    try {
        localStorage.setItem('filamentos3d_v2', JSON.stringify(filamentos));
    } catch(e){}
    atualizarTudo();
}

function atualizarTudo() {
    // 1. Atualizar a listinha visual do estoque
    const lista = document.getElementById('listaFilamentos');
    lista.innerHTML = filamentos.length === 0 ? '<p style="color: #6b7280; font-size: 0.85rem; margin:0;">Nenhum filamento salvo.</p>' : '';
    filamentos.forEach(f => {
        lista.innerHTML += `
            <div class="list-item">
                <span><strong>${f.nome}</strong> - R$ ${f.preco.toFixed(2).replace('.',',')}/kg</span>
                <button class="danger-btn" onclick="deletarFilamento(${f.id})">Excluir</button>
            </div>`;
    });

    // 2. Atualizar as caixinhas de escolha de filamento (Selects)
    document.querySelectorAll('.filamento-select').forEach(select => {
        const valorAntigo = select.value;
        select.innerHTML = '<option value="">Nenhum / Não usado</option>';
        filamentos.forEach(f => {
            select.innerHTML += `<option value="${f.id}">${f.nome} (R$ ${f.preco}/kg)</option>`;
        });
        select.value = valorAntigo;
    });
}

function calcular() {
    const id1 = document.getElementById('selectMat1').value;
    const g1 = parseFloat(document.getElementById('g1').value) || 0;
    const h1 = parseFloat(document.getElementById('h1').value) || 0;

    const id2 = document.getElementById('selectMat2').value;
    const g2 = parseFloat(document.getElementById('g2').value) || 0;
    const h2 = parseFloat(document.getElementById('h2').value) || 0;

    const extras = parseFloat(document.getElementById('extras').value) || 0;
    const kwh = parseFloat(document.getElementById('kwh').value) || 0;
    const dep = parseFloat(document.getElementById('dep').value) || 0;
    const consumoA1 = 0.06;

    let custoM1 = 0, nomeM1 = "Material 1";
    if (id1) {
        const f1 = filamentos.find(f => f.id == id1);
        if (f1) { custoM1 = (g1 / 1000) * f1.preco; nomeM1 = f1.nome; }
    }

    let custoM2 = 0, nomeM2 = "Material 2";
    if (id2) {
        const f2 = filamentos.find(f => f.id == id2);
        if (f2) { custoM2 = (g2 / 1000) * f2.preco; nomeM2 = f2.nome; }
    }

    const horasTotais = h1 + h2;
    const custoEnergia = horasTotais * consumoA1 * kwh;
    
    const subtotalProducao = custoM1 + custoM2 + custoEnergia;
